<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mensajeria</title>

    <style>
      /* Configuración de fuente global */
      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }
      /* Animación del gradiente de fondo (efecto cyberpunk sutil) */
      @keyframes gradient-shift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }
      .gradient-bg {
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e1b4b 50%,
          #0f172a 100%
        );
        background-size: 200% 200%;
        animation: gradient-shift 15s ease infinite;
      }
      /* Efecto glow para el botón principal */
      .glow-on-hover:hover {
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.5),
          0 0 40px rgba(124, 58, 237, 0.3);
      }
      /* Ocultar el input de archivo original pero mantenerlo funcional */
      .file-input-hidden {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }
      /* Estilo para quitar flechas del input number en Chrome/Safari */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      /* Estilo para Firefox */
      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
  </head>
  <body class="h-full min-h-screen flex flex-col ">

    <!-- Header -->

    <div class="w-full h-1/8 bg-slate-800 flex items-center pl-28 p-2 ">
      <img class="w-16 h-16 rounded-2xl shadow-lg" src="../assets/GhostVault-icon.ico" alt="">
      <h1 class="pl-4 text-4xl text-violet-400">GhostVault</h1>
    </div>

    <!-- Content Messaging  -->
     
    <div class=" w-full grow bg-slate-800 flex flex-col  justify-center items-center" >
      <h2 class=" text-4xl text-violet-400 p-2"> Mensaje Secreto </h2>
      <div id="messages-container"  class=" w-3/4 h-4/5  border-2 rounded-md border-violet-800 pb-12 bg-violet-900/15 overflow-auto">

      </div>


    </div>

    <script src="./js/Messages.js"></script>
  </body>
  
  </html>
